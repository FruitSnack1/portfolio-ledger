# Blueprint: https://render.com/docs/blueprint-spec
# After first deploy, set in the Render dashboard (Environment):
#   DATABASE_URL, JWT_SECRET
# If the UI is on another host (e.g. Vercel), also set:
#   CORS_ORIGINS=https://your-app.vercel.app   (no trailing slash; or use CORS_ORIGIN for one URL)
#   AUTH_COOKIE_SAME_SITE=none

services:
  - type: web
    name: portfolio-ledger-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
